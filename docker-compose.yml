services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    # host networking so Wake-on-LAN magic packets reach the physical LAN.
    # On a Docker bridge network, the L2/limited broadcast never leaves the
    # bridge, so /wake silently fails. Host mode shares the host's eth0 so the
    # server binds directly on host:4000 (the `ports:` mapping is redundant/ignored).
    network_mode: host
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - PORT=4000
      - MANAGER_HOST=0.0.0.0
      - MANAGER_ADVERTISE_HOST=${MANAGER_ADVERTISE_HOST:-192.168.44.36}
      - SSH_USER=${SSH_USER:-daniel}
      - HF_TOKEN=${HF_TOKEN:-}
      - SHARED_STORAGE_PATH=${SHARED_STORAGE_PATH:-/mnt/tank}
      - LLAMA_BENCHY_VERSION=${LLAMA_BENCHY_VERSION:-0.3.7}
    volumes:
      - dgx-data:/app/data
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${SHARED_STORAGE_PATH:-/mnt/tank}:${SHARED_STORAGE_PATH:-/mnt/tank}
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://${MANAGER_ADVERTISE_HOST:-192.168.44.36}:4000
        NEXT_PUBLIC_WS_URL: ws://${MANAGER_ADVERTISE_HOST:-192.168.44.36}:4000/ws/dashboard
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  dgx-data:
