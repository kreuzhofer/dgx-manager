# @dgxrun/glm-5.2-cyankiwi-unpruned-dcp2 — UNPRUNED cyankiwi AWQ (pure W4A16) + DCP2, 256K.
# THE working unpruned base on GB10/sm_121: pure W4A16 uses the same Marlin MoE path our pruned
# model loads fine (QuantTrio Int4-Int8Mix HANGS at Marlin MoE construction — its Int8 experts;
# see memory glm52-unpruned-model-choice-sm121). cyankiwi is the community's proven unpruned base
# + the unpruned parent of CosmicRaisins/GLM-5.2-AWQ-INT4-15pct.
# v1 = enforce-eager (no capture-OOM fight) + no MTP, to prove it SERVES at 256K first. Then optimize
# decode (cudagraph FULL/PIECEWISE + separate MTP drafter) once the load+serve is confirmed.
recipe_version: "2"
runner: dgxrun
maxoutmem: true
model: cyankiwi/GLM-5.2-AWQ-INT4
runtime: vllm
container: vllm-node-tf5-glm52-b12x-dcp:probe
cluster_only: true
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.93   # community knife-edge (0.935 trips the boot guard); ~104GB/node weights + 256K KV
  max_model_len: 262144   # 256K via DCP2
  served_model_name: glm-5.2
env:
  HF_HOME: /cache/huggingface
  HF_HUB_OFFLINE: "1"
  LD_PRELOAD: /cache/huggingface/nccl-2.30.4/libnccl.so.2
  TRITON_CACHE_DIR: /cache/huggingface/.jit-cache-cyankiwi/triton
  TORCHINDUCTOR_CACHE_DIR: /cache/huggingface/.jit-cache-cyankiwi/inductor
  VLLM_CACHE_ROOT: /cache/huggingface/.jit-cache-cyankiwi/vllm
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "5400"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_USE_B12X_SPARSE_INDEXER: "1"
  VLLM_USE_V2_MODEL_RUNNER: "1"
  VLLM_DCP_GLOBAL_TOPK: "1"
  VLLM_DCP_SHARD_DRAFT: "1"
  TORCH_CUDA_ARCH_LIST: "12.1a"
  GLM52_BIND_HOST_TRITON: "0"
  NCCL_NET: IB
  NCCL_IB_DISABLE: "0"
  NCCL_IB_HCA: "rocep1s0f0,roceP2p1s0f0"
  NCCL_SOCKET_IFNAME: "enP7s7,enp1s0f0np0,enP2p1s0f0np0"
  GLOO_SOCKET_IFNAME: enp1s0f0np0
  NCCL_IB_GID_INDEX: "3"
  NCCL_CROSS_NIC: "1"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_DEBUG: WARN
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
command: |
  vllm serve {model} --served-model-name {served_model_name} --host {host} --port {port} --trust-remote-code --reasoning-parser glm45 --tool-call-parser glm47 --enable-auto-tool-choice --enable-prefix-caching -tp {tensor_parallel} --pipeline-parallel-size 1 --decode-context-parallel-size 2 --dcp-kv-cache-interleave-size 1 --attention-backend B12X_MLA_SPARSE --hf-overrides '{"index_topk_pattern":"FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS"}' --max-model-len {max_model_len} --max-num-seqs 1 --max-num-batched-tokens 4096 --gpu-memory-utilization {gpu_memory_utilization} --kv-cache-dtype fp8_ds_mla --async-scheduling --distributed-executor-backend mp --enforce-eager
