# @dgxrun/glm-5.2-awq-15pct-dcp2-prewarm — JIT cache warmer for the DCP2 stack.
# IDENTICAL compile-affecting config to glm-5.2-awq-15pct-dcp2.yaml (model, MTP spec-config, DCP2,
# B12X_MLA_SPARSE, index_topk_pattern, cudagraph FULL, max-num-seqs 1, max-num-batched-tokens 4096),
# differing ONLY in max_model_len (8K) + gmu (0.76). The tiny KV + low gmu leave ~30 GB free so the
# ~20-30 GB first-run JIT compile spike succeeds and populates the Triton/Inductor/FlashInfer caches
# (on NFS, shared across nodes). RUN THIS FIRST, wait for it to reach `running` (capture complete),
# then TEAR IT DOWN and deploy the full glm-5.2-awq-15pct-dcp2.yaml — which now finds warm caches and
# skips the spike, so 256K/0.88 fits. See docs/glm-5.2-dcp-nodeprep-retry.md.
recipe_version: "2"
runner: dgxrun
maxoutmem: true
model: CosmicRaisins/GLM-5.2-AWQ-INT4-15pct
runtime: vllm
container: vllm-node-tf5-glm52-b12x-dcp:probe
cluster_only: true
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.76   # just fits weights (~88/121.63=0.72) + tiny 8K KV; ~30 GB free for the compile spike
  max_model_len: 8192            # tiny KV — compilation is keyed on batch/capture sizes, NOT context, so kernels transfer
  served_model_name: glm-5.2
env:
  HF_HOME: /cache/huggingface
  HF_HUB_OFFLINE: "1"
  LD_PRELOAD: /cache/huggingface/nccl-2.30.4/libnccl.so.2
  TRITON_CACHE_DIR: /cache/huggingface/.tritoncache-dcp
  TORCHINDUCTOR_CACHE_DIR: /cache/huggingface/.inductorcache-dcp
  FLASHINFER_WORKSPACE_DIR: /cache/huggingface/.flashinfer-dcp
  FLASHINFER_AUTOTUNE_DIR: /cache/huggingface/.flashinfer-autotune-dcp
  FLASHINFER_AUTOTUNER_LOAD_FROM_FILE: "1"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "5400"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_USE_B12X_SPARSE_INDEXER: "1"
  VLLM_USE_V2_MODEL_RUNNER: "1"
  VLLM_DCP_GLOBAL_TOPK: "1"
  VLLM_DCP_SHARD_DRAFT: "1"
  TORCH_CUDA_ARCH_LIST: "12.1a"
  GLM52_BIND_HOST_TRITON: "0"
  NCCL_NET: IB
  NCCL_IB_DISABLE: "0"
  NCCL_IB_HCA: "rocep1s0f0,roceP2p1s0f0"
  NCCL_SOCKET_IFNAME: "enP7s7,enp1s0f0np0,enP2p1s0f0np0"
  GLOO_SOCKET_IFNAME: enp1s0f0np0
  NCCL_IB_GID_INDEX: "3"
  NCCL_CROSS_NIC: "1"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_DEBUG: WARN
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
command: |
  vllm serve {model} --served-model-name {served_model_name} --host {host} --port {port} --trust-remote-code --reasoning-parser glm45 --tool-call-parser glm47 --enable-auto-tool-choice --enable-prefix-caching --speculative-config '{"model":"CosmicRaisins/GLM-5.2-MTP-INT4-aligned","method":"mtp","draft_attention_backend":"B12X_MLA_SPARSE","num_speculative_tokens":3,"draft_sample_method":"probabilistic"}' -tp {tensor_parallel} --pipeline-parallel-size 1 --decode-context-parallel-size 2 --dcp-kv-cache-interleave-size 1 --attention-backend B12X_MLA_SPARSE --hf-overrides '{"index_topk_pattern":"FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS"}' --max-model-len {max_model_len} --max-num-seqs 1 --max-num-batched-tokens 4096 --gpu-memory-utilization {gpu_memory_utilization} --kv-cache-dtype fp8_ds_mla --async-scheduling --distributed-executor-backend mp --compilation-config '{"cudagraph_mode":"FULL","max_cudagraph_capture_size":10}'
