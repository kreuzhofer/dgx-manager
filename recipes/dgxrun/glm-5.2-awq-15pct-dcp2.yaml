# @dgxrun/glm-5.2-awq-15pct-dcp2 — long-context (DCP2) variant of the 15pct model.
# Config mirrors the community reference CosmicRaisins/recipes/glm52-quanttrio-unpruned-dcp2-320k.yaml
# (the e232d26 DCP stack), adapted for our 15pct AWQ model + separate MTP drafter + dgxrun.
# DCP2 shards MLA KV across the 4 ranks (~4x the no-DCP window). Requires the DCP image
# (scripts/build-glm52-image.sh dcp). Backend is B12X_MLA_SPARSE (needs the index_topk_pattern
# hf-override + VLLM_USE_B12X_SPARSE_INDEXER). Fallback: glm-5.2-awq-15pct-144k.yaml (no DCP).
recipe_version: "2"
runner: dgxrun
maxoutmem: true
model: CosmicRaisins/GLM-5.2-AWQ-INT4-15pct
runtime: vllm
container: vllm-node-tf5-glm52-b12x-dcp:probe
cluster_only: true
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.88   # weights(~88) + 256K DCP2 KV(~19) = ~107 GiB; needs guard-free >= 107
                                 # (min_free 1-2GiB + isolate desktop). Run AFTER the -prewarm run warms
                                 # the JIT caches, so no +20-30GB compile spike lands here.
  max_model_len: 262144   # 256K
  served_model_name: glm-5.2
env:
  HF_HOME: /cache/huggingface
  HF_HUB_OFFLINE: "1"
  LD_PRELOAD: /cache/huggingface/nccl-2.30.4/libnccl.so.2
  # All JIT caches under ONE subfolder on NFS (not scattered in the model root) — MUST match
  # glm-5.2-awq-15pct-dcp2-prewarm.yaml exactly (paths + max_model_len) or the full run recompiles.
  TRITON_CACHE_DIR: /cache/huggingface/.jit-cache-dcp/triton
  TORCHINDUCTOR_CACHE_DIR: /cache/huggingface/.jit-cache-dcp/inductor
  VLLM_CACHE_ROOT: /cache/huggingface/.jit-cache-dcp/vllm
  FLASHINFER_JIT_DIR: /cache/huggingface/.jit-cache-dcp/flashinfer-jit
  FLASHINFER_WORKSPACE_DIR: /cache/huggingface/.jit-cache-dcp/flashinfer-ws
  FLASHINFER_AUTOTUNE_DIR: /cache/huggingface/.jit-cache-dcp/flashinfer-autotune
  FLASHINFER_AUTOTUNER_LOAD_FROM_FILE: "1"
  TORCHINDUCTOR_COMPILE_THREADS: "1"   # serialize any residual compile (cache miss) so it fits alongside weights+KV
  MAX_JOBS: "2"
  NVCC_THREADS: "1"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "5400"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_USE_B12X_SPARSE_INDEXER: "1"
  VLLM_USE_V2_MODEL_RUNNER: "1"
  VLLM_DCP_GLOBAL_TOPK: "1"
  VLLM_DCP_SHARD_DRAFT: "1"
  TORCH_CUDA_ARCH_LIST: "12.1a"
  GLM52_BIND_HOST_TRITON: "0"
  NCCL_NET: IB
  NCCL_IB_DISABLE: "0"
  NCCL_IB_HCA: "rocep1s0f0,roceP2p1s0f0"
  NCCL_SOCKET_IFNAME: "enP7s7,enp1s0f0np0,enP2p1s0f0np0"
  GLOO_SOCKET_IFNAME: enp1s0f0np0
  NCCL_IB_GID_INDEX: "3"
  NCCL_CROSS_NIC: "1"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_DEBUG: WARN
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
command: |
  vllm serve {model} --served-model-name {served_model_name} --host {host} --port {port} --trust-remote-code --reasoning-parser glm45 --tool-call-parser glm47 --enable-auto-tool-choice --enable-prefix-caching -tp {tensor_parallel} --pipeline-parallel-size 1 --decode-context-parallel-size 2 --dcp-kv-cache-interleave-size 1 --attention-backend B12X_MLA_SPARSE --hf-overrides '{"index_topk_pattern":"FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS"}' --max-model-len {max_model_len} --max-num-seqs 1 --max-num-batched-tokens 4096 --gpu-memory-utilization {gpu_memory_utilization} --kv-cache-dtype fp8_ds_mla --async-scheduling --distributed-executor-backend mp --compilation-config '{"cudagraph_mode":"FULL","max_cudagraph_capture_size":10}'
