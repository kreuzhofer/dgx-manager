recipe_version: "2"
runner: dgxrun
maxoutmem: true
# 128K-context sibling of glm-5.2-quanttrio-c16-64k. Same concurrency recipe
# (batched serving, no MTP, --max-num-seqs 16, 6 GiB KV, PIECEWISE cudagraph);
# the ONLY changes are max_model_len 65536 -> 131072 and --max-num-batched-tokens
# 4096 -> 2048. See c16-64k for the full tuning rationale and the spec
# (docs/superpowers/specs/2026-07-12-glm52-eval-recipe-variant.md).
#
# Why doubling context is ~free here:
#   The binding memory wall on this stack is the b12x sparse-indexer PREWARM,
#   whose workspace is proportional to (max_num_batched_tokens x max_model_len).
#   c16-64k loads with only ~3 GiB headroom, so doubling max_model_len ALONE
#   (+~2.5 GiB prewarm) would OOM at load. Halving mnbt while doubling max_model_len
#   keeps that product — and thus the prewarm workspace — IDENTICAL to c16-64k, so
#   it fits. Cost: slightly slower prefill (more chunking at mnbt 2048) — fine for
#   evals. This is the same lever the 320K recipe uses (mnbt 1024 to reach 320K).
#
# What 128K buys, and its limit:
#   - Long agent trajectories (mini-SWE-agent can push past 64K) no longer truncate.
#   - GPQA/AIME (<10K prompts) are unaffected.
#   - The KV POOL is unchanged (6 GiB ~= 235K tokens), so a single 128K request eats
#     more of the pool => FEWER long requests run concurrently than at 64K. This
#     trades concurrency for per-request context, deliberately.
#
# STATUS: derived from the c16-64k validation via the prewarm-constant math above,
# but NOT yet load-tested on hardware. On first deploy, watch the startup log for an
# OOM at the indexer prewarm / KV init (same failure mode c16-64k hit at 24/12 GiB
# KV). If it OOMs, the prewarm estimate was off — drop mnbt to 1024 (halves prewarm
# again) before touching KV.
model: QuantTrio/GLM-5.2-Int4-Int8Mix
runtime: vllm
container: vllm-node-tf5-glm52-b12x-dcp:probe
cluster_only: true
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 4
  gpu_memory_utilization: 0.88
  max_model_len: 131072  # 128K — for long agent trajectories; mnbt halved to 2048 to hold prewarm constant
  served_model_name: glm-5.2
env:
  HF_HOME: /cache/huggingface
  HF_HUB_OFFLINE: "1"
  LD_PRELOAD: /cache/huggingface/nccl-2.30.4/libnccl.so.2
  TRITON_CACHE_DIR: /root/glm-jit/triton
  TORCHINDUCTOR_CACHE_DIR: /root/glm-jit/inductor
  VLLM_CACHE_ROOT: /root/glm-jit/vllm
  FLASHINFER_JIT_DIR: /root/glm-jit/flashinfer-jit
  FLASHINFER_WORKSPACE_DIR: /root/glm-jit/flashinfer-ws
  FLASHINFER_AUTOTUNE_DIR: /root/glm-jit/flashinfer-autotune
  FLASHINFER_AUTOTUNER_LOAD_FROM_FILE: "1"
  TORCHINDUCTOR_COMPILE_THREADS: "1"
  MAX_JOBS: "2"
  NVCC_THREADS: "1"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "5400"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_USE_B12X_SPARSE_INDEXER: "1"
  VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "256"
  VLLM_USE_V2_MODEL_RUNNER: "1"
  VLLM_DCP_GLOBAL_TOPK: "1"
  # VLLM_DCP_SHARD_DRAFT dropped — no MTP drafter to shard.
  TORCH_CUDA_ARCH_LIST: "12.1a"
  GLM52_BIND_HOST_TRITON: "0"
  NCCL_NET: IB
  NCCL_IB_DISABLE: "0"
  NCCL_IB_HCA: "rocep1s0f0,roceP2p1s0f0"
  NCCL_SOCKET_IFNAME: "enP7s7,enp1s0f0np0,enP2p1s0f0np0"
  GLOO_SOCKET_IFNAME: enp1s0f0np0
  NCCL_IB_GID_INDEX: "3"
  NCCL_CROSS_NIC: "1"
  NCCL_CUMEM_ENABLE: "0"
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_DEBUG: WARN
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
command: |
  vllm serve {model} --served-model-name {served_model_name} --host {host} --port {port} --trust-remote-code --reasoning-parser glm45 --tool-call-parser glm47 --enable-auto-tool-choice --enable-prefix-caching -tp {tensor_parallel} --pipeline-parallel-size 1 --decode-context-parallel-size 2 --dcp-kv-cache-interleave-size 1 --attention-backend B12X_MLA_SPARSE --hf-overrides '{"index_topk_pattern":"FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS"}' --max-model-len {max_model_len} --max-num-seqs 16 --max-num-batched-tokens 2048 --gpu-memory-utilization {gpu_memory_utilization} --kv-cache-dtype fp8_ds_mla --kv-cache-memory-bytes 6442450944 --async-scheduling --distributed-executor-backend mp --compilation-config '{"cudagraph_mode":"PIECEWISE","max_cudagraph_capture_size":16}'
